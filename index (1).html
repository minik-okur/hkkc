<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sözcük</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ZONE A: SKOR ÇUBUĞU -->
  <div id="zone-a">
    <div class="skor-item">
      <span id="puan">0</span>
      <span class="lbl">PUAN</span>
    </div>

    <div class="skor-item">
      <span id="kelime-sayisi">0</span>
      <span class="lbl">KELİME</span>
    </div>

    <div class="skor-item skor-can">
      <div id="canlar"></div>
      <span class="lbl">CAN</span>
    </div>

    <div class="skor-item">
      <button id="ipucu-btn" onclick="Game.ipucuKullan()" title="İpucu (1 can)">💡</button>
      <span class="lbl">İPUCU</span>
    </div>

    <div class="skor-item">
      <span id="seviye">1</span>
      <span class="lbl">SEVİYE</span>
    </div>
  </div>

  <!-- ZONE B: BORULAR -->
  <div id="zone-b">
    <div id="borular-sarici">
      <div id="borular"></div>
    </div>
  </div>

  <!-- BEKLEYEN HARF -->
  <div id="bekleyen-alan">
    <div id="bekleyen-ic">
      <div id="bekleyen-harf"></div>
      <div id="timer-bar"><div id="timer-fill"></div></div>
    </div>
  </div>

  <!-- ZONE C: TEZGAH -->
  <div id="zone-c">
    <div id="tezgah-label">KELİME</div>
    <div id="tezgah"></div>
  </div>

  <!-- ZONE SOZ: ATASÖZÜ İNŞA ALANI -->
  <div id="zone-soz">
    <div id="soz-label">ATASÖZÜ</div>
    <div id="soz-kutucuklar"></div>
    <div id="soz-kaynak"></div>
  </div>

  <!-- ZONE D: YANLIŞ HARFLER -->
  <div id="zone-d">
    <div id="yanlis-grid"></div>
  </div>

  <!-- SEVİYE SONU OVERLAY -->
  <div id="seviye-sonu" class="gizli">
    <div id="ss-icerik">
      <div id="ss-rozet">🏆</div>
      <div id="ss-seviye"></div>
      <div id="ss-soz"></div>
      <div id="ss-kaynak"></div>
      <button id="ss-devam">DEVAM <span>→</span></button>
    </div>
  </div>

  <!-- MODÜLLER — sıra önemli -->
  <script src="ses.js"></script>
  <script src="words.js"></script>
  <script src="ui.js"></script>
  <script src="grid.js"></script>
  <script src="game.js"></script>

</body>
</html>
