<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sözcük</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ZONE A: ÜST BAR — can / progress / puan / ipucu -->
  <div id="zone-a">
    <!-- Sol: Can -->
    <div id="can-bolge">
      <span id="can-kalp-ikon">❤️</span>
      <span id="can-sayi">3</span>
    </div>

    <!-- Orta: Seviye + Progress -->
    <div id="orta-bolge">
      <span id="seviye-etiket">SEVİYE 1</span>
      <div id="progress-wrap">
        <div id="progress-bar"></div>
      </div>
    </div>

    <!-- Sağ: Puan + İpucu -->
    <div id="sag-bolge">
      <div id="puan-kutu">
        <span id="puan">0</span>
        <span id="puan-lbl">PUAN</span>
      </div>
      <button id="ipucu-btn" title="İpucu (1 can)">💡</button>
    </div>
  </div>

  <!-- Combo badge (floating) -->
  <div id="combo-badge"></div>

  <!-- ZONE SÜRE: Zamanlayıcı -->
  <div id="zone-sure">
    <div id="sure-wrap">
      <div id="sure-bar"></div>
    </div>
    <span id="sure-sayi">15</span>
  </div>

  <!-- ZONE C: TEZGAH — kelime slotları -->
  <div id="zone-c">
    <div id="tezgah-label">KELİME</div>
    <div id="tezgah"></div>
  </div>

  <!-- ZONE B: SEÇİM KARTLARI (eskiden borular) -->
  <div id="zone-b">
    <div id="boru-soru">HANGİ HARF?</div>
    <div id="borular"></div>
  </div>

  <!-- ZONE H: HARF HAVUZU -->
  <div id="zone-h">
    <div id="havuz-label">HARF HAVUZU</div>
    <div id="harf-havuzu"></div>
  </div>

  <!-- ZONE SOZ: ATASÖZÜ -->
  <div id="zone-soz">
    <div id="soz-label">ATASÖZÜ</div>
    <div id="soz-kutucuklar"></div>
    <div id="soz-kaynak"></div>
  </div>

  <!-- ZONE D: YANLIŞ HARFLER -->
  <div id="zone-d">
    <div id="yanlis-grid"></div>
  </div>

  <!-- SEVİYE SONU OVERLAY -->
  <div id="seviye-sonu" class="gizli">
    <div id="ss-icerik">
      <div id="ss-rozet">🏆</div>
      <div id="ss-seviye"></div>
      <div id="ss-soz"></div>
      <div id="ss-kaynak"></div>
      <button id="ss-devam">DEVAM →</button>
    </div>
  </div>

  <!-- OYUN BİTTİ OVERLAY -->
  <div id="oyun-bitti-overlay">
    <div id="ob-kart">
      <div id="ob-emoji">💔</div>
      <div id="ob-baslik">OYUN BİTTİ</div>
      <div id="ob-stats">
        <div class="ob-stat">
          <span class="ob-stat-lbl">PUAN</span>
          <span class="ob-stat-val" id="ob-puan">0</span>
        </div>
        <div class="ob-stat">
          <span class="ob-stat-lbl">KELİME</span>
          <span class="ob-stat-val" id="ob-kelime">0</span>
        </div>
        <div class="ob-stat">
          <span class="ob-stat-lbl">SEVİYE</span>
          <span class="ob-stat-val" id="ob-seviye">1</span>
        </div>
        <div class="ob-stat">
          <span class="ob-stat-lbl">EN İYİ COMBO</span>
          <span class="ob-stat-val" id="ob-combo">0</span>
        </div>
      </div>
      <button id="ob-tekrar">TEKRAR OYNA 🔄</button>
    </div>
  </div>

  <script src="ses.js"></script>
  <script src="words.js"></script>
  <script src="ui.js"></script>
  <script src="grid.js"></script>
  <script src="game.js"></script>

</body>
</html>
